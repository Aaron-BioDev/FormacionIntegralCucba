<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idiomas | CUCBA</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗣️</text></svg>">
    <link rel="stylesheet" href="../../shared-cards.css">
    <style>:root { --accent: #c0392b; }</style>
</head>
<body>
    
    <div class="nav-container">
        <ul>
            <li><a class="list-items" href="/carrusel/">Inicio</a></li>
            <li><a class="list-items" href="#">Talleres</a></li>
        </ul>
    </div>

    <header>
        <h1>Idiomas</h1>
    </header>

    <div class="cards-container">
        
        <!-- Chino Mandarin -->
        <div class="card">
            <div class="face front">
                <img src="IMG/CHINO 1.jpg" alt="Chino Mandarín" onerror="this.src='https://via.placeholder.com/300x400?text=Chino'">
                <h3>Chino Mandarín Básico</h3>
            </div>
            <div class="face back">
                <h3>Chino Mandarín</h3>
                <p>Adéntrate en el idioma del futuro, su milenaria gramática y fonética.</p>
                <div class="link">
                    <a href="/registros-cucba/idiomas-registros/chino-mandarin">Información</a>
                </div>
            </div>
        </div>

        <!-- Nahuatl -->
        <div class="card">
            <div class="face front">
                <img src="IMG/NAHUATL 1.jpg" alt="Náhuatl" onerror="this.src='https://via.placeholder.com/300x400?text=Nahuatl'">
                <h3>Náhuatl Básico</h3>
            </div>
            <div class="face back">
                <h3>Náhuatl Básico</h3>
                <p>Rescata el conocimiento y las raíces de este lenguaje ancestral.</p>
                <div class="link">
                    <a href="/registros-cucba/idiomas-registros/nahuatl-basico">Información</a>
                </div>
            </div>
        </div>

    </div>

</body>
</html>
