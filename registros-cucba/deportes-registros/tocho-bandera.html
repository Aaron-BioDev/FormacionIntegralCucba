<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏈</text></svg>">
    
    <title>Taller de Tocho Bandera | CUCBA</title>
    <meta name="description" content="Taller de Tocho Bandera de Formación Integral CUCBA. Horarios y registro en línea.">
    <meta property="og:title" content="🏈 Taller de Tocho Bandera | Formación Integral CUCBA">
    <meta property="og:description" content="Únete, ponte bandera y registra tus horas deportivas.">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<body>
    <header class="header">
        <div class="logo">🏈</div>
        <h1>Taller de Tocho Bandera</h1>
    </header>

    <main class="container">
        <section class="video-section">
            <div class="video-container">
                <iframe src="https://drive.google.com/file/d/1dEtCthjs7SbMLNdZbddAT4PUnui3wiqu/preview" allow="autoplay" allowfullscreen loading="lazy"></iframe>
            </div>
        </section>

        <section class="info-grid">
            <div class="info-card">
                <h2><i class="fas fa-calendar-alt"></i> Horarios</h2>
                <ul>
                    <li><strong>Lunes a Viernes</strong></li>
                    <li>11:00 AM - 1:00 PM</li>
                </ul>
            </div>
            <div class="info-card">
                <h2><i class="fas fa-map-marker-alt"></i> Lugar</h2>
                <p>Canchas CUCBA</p>
            </div>
        </section>

        <section class="coaches">
            <h2>Nuestros Entrenadores</h2>
            <div class="coach-grid">
                <div class="coach-card">
                    <img src="Fotos Entrenadores/IMG-entrenador1.jpg" alt="Entrenador Juan" loading="lazy">
                    <p>Juan Pérez</p>
                </div>
                <div class="coach-card">
                    <img src="Fotos Entrenadores/IMG-entrenador2.jpg" alt="Entrenadora María" loading="lazy">
                    <p>María González</p>
                </div>
            </div>
        </section>

        <div class="action-area">
            <div class="buttons">
                <a href="/Talleres CUCBA/Cards Deportes/index.html" class="btn btn-secondary">Regresar</a>
                <a href="/Formulario de Registro/Registro talleres.html" class="btn btn-primary">Registrarse al taller</a>
            </div>

        </div>
    </main>

    <footer class="footer">
        <p>© 2025 Aaron Guzman Hinojosa</p>
        <p><strong>Formación Integral CUCBA</strong></p>
    </footer>
